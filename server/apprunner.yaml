version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip3 install -r requirements.txt

run:
  runtime-version: "3.11"
  command: gunicorn --bind 0.0.0.0:8000 --workers 2 --timeout 120 run:app
  network:
    port: 8000
  env:
    - name: FLASK_ENV
      value: production
    - name: PORT
      value: "8000"
    - name: MONGO_DBNAME
      value: infradb
    - name: MONGO_URI
      value: "REPLACE_WITH_YOUR_MONGO_URI"
    - name: JWT_SECRET
      value: "REPLACE_WITH_YOUR_JWT_SECRET"
    - name: CLOUDINARY_CLOUD_NAME
      value: "REPLACE_WITH_YOUR_CLOUD_NAME"
    - name: CLOUDINARY_API_KEY
      value: "REPLACE_WITH_YOUR_API_KEY"
    - name: CLOUDINARY_API_SECRET
      value: "REPLACE_WITH_YOUR_API_SECRET"
    - name: CORS_ALLOWED_ORIGINS
      value: "REPLACE_WITH_YOUR_FRONTEND_URL"
