name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ Error: RENDER_DEPLOY_HOOK secret is not set in GitHub."
            echo "Go to Render -> Your Web Service -> Settings -> Deploy Hook -> Copy the URL."
            echo "Then add it as a Repository Secret in GitHub named RENDER_DEPLOY_HOOK."
            exit 1
          fi
          
          echo "🚀 Triggering Render deployment via exact hook URL..."
          response=$(curl -s -w "%{http_code}" -X POST -d '' "$RENDER_DEPLOY_HOOK")
          http_code=$(echo "$response" | tail -n1)
          
          if [ "$http_code" -ne 200 ] && [ "$http_code" -ne 201 ] && [ "$http_code" -ne 204 ]; then
            echo "❌ Failed to trigger deployment. HTTP Status: $http_code"
            exit 1
          else
            echo "✅ Deployment triggered successfully! Check the Render dashboard for logs."
          fi
